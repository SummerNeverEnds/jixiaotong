server:
  port: 8080

spring:
  application:
    name: performance-service
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        enabled: true
      config:
        server-addr: 127.0.0.1:8848
        file-extension: yaml
        enabled: true
    openfeign:
      client:
        config:
          oa-ai-service:
            connectTimeout: 5000
            readTimeout: 120000
  config:
    import:
      - optional:nacos:performance-service.yaml?refresh=true

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/performance_db?useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: root
    password: 123456

  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 0

  elasticsearch:
    uris: http://127.0.0.1:9200

  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss

oa-ai-service:
  url:

jwt:
  secret: jixiaotong-performance-jwt-secret-key-2026-change-me
  expire-hours: 24

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0
