server:
  port: 8088

spring:
  application:
    name: gateway-service
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        enabled: true
      config:
        server-addr: 127.0.0.1:8848
        file-extension: yaml
        enabled: true
    gateway:
      discovery:
        locator:
          enabled: false
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns:
              - "http://localhost:*"
              - "http://127.0.0.1:*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600 #有效期：1小时
      routes:
        - id: performance-service
          uri: lb://performance-service
          predicates:
            - Path=/api/**
  config:
    import:
      - optional:nacos:gateway-service.yaml?refresh=true

  data:
    redis:
      host: 127.0.0.1
      port: 6834
      database: 0

jwt:
  secret: jixiaotong-performance-jwt-secret-key-2026-change-me
  expire-hours: 24

gateway:
  login-rate-limit:
    window-seconds: 60
    max-requests: 20
