server:
  port: 8081

spring:
  application:
    name: oa-ai-service
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        enabled: true
  ai:
    ollama:
      base-url: http://127.0.0.1:11434
      chat:
        options:
          model: qwen2.5:3b
          temperature: 0.3
          num-predict: 512

ai:
  evaluate:
    fallback-enabled: true
    comment-max-length: 480

logging:
  level:
    com.jixiaotong.ai: INFO
    org.springframework.ai: INFO
